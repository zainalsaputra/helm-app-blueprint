# Example values for a React single-page application served by a web server.
#
# Assumptions:
# - The built React assets are already baked into the container image.
# - The container serves HTTP traffic on port 8080.
# - Runtime public configuration is injected through non-sensitive env vars only
#   when the image entrypoint supports it.

replicaCount: 2

nameOverride: react-spa

image:
  repository: ghcr.io/example/react-spa
  tag: "1.0.0"

configMap:
  create: true
  data:
    PUBLIC_API_BASE_URL: https://api.example.com

container:
  ports:
    http:
      containerPort: 8080
      protocol: TCP

probes:
  readiness:
    enabled: true
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 3
    periodSeconds: 10
  liveness:
    enabled: true
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 10
    periodSeconds: 20

resources:
  requests:
    cpu: 25m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: app.example.com
      paths:
        - path: /
          pathType: Prefix
          servicePort: http
  tls:
    - secretName: app-example-com-tls
      hosts:
        - app.example.com

podDisruptionBudget:
  enabled: true
  maxUnavailable: 1

name: Release chart repository

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      HELM_GPG_KEY_FINGERPRINT: 83277AE8E473B1DE0E1D099C97173EB43D39EA40
      HELM_GPG_KEY_NAME: "Helm App Blueprint Release <zainalsaputra@users.noreply.github.com>"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5
        with:
          version: v3.17.3

      - name: Import chart signing key
        shell: bash
        env:
          HELM_GPG_PRIVATE_KEY: ${{ secrets.HELM_GPG_PRIVATE_KEY }}
          HELM_GPG_PASSPHRASE: ${{ secrets.HELM_GPG_PASSPHRASE }}
        run: |
          set -euo pipefail
          test -n "${HELM_GPG_PRIVATE_KEY}"
          test -n "${HELM_GPG_PASSPHRASE}"

          export GNUPGHOME="${RUNNER_TEMP}/gnupg"
          mkdir -p "${GNUPGHOME}"
          chmod 700 "${GNUPGHOME}"

          printf '%s' "${HELM_GPG_PRIVATE_KEY}" | gpg --batch --import
          printf '%s' "${HELM_GPG_PASSPHRASE}" > "${RUNNER_TEMP}/helm-gpg-passphrase"
          chmod 600 "${RUNNER_TEMP}/helm-gpg-passphrase"

          gpg --batch --yes --pinentry-mode loopback \
            --passphrase-file "${RUNNER_TEMP}/helm-gpg-passphrase" \
            --output "${RUNNER_TEMP}/helm-secring.gpg" \
            --export-secret-keys "${HELM_GPG_KEY_FINGERPRINT}"

          echo "GNUPGHOME=${GNUPGHOME}" >> "${GITHUB_ENV}"

      - name: Package signed chart
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .cr-release-packages
          helm package ./charts/app-blueprint \
            --destination .cr-release-packages \
            --sign \
            --key "${HELM_GPG_KEY_NAME}" \
            --keyring "${RUNNER_TEMP}/helm-secring.gpg" \
            --passphrase-file "${RUNNER_TEMP}/helm-gpg-passphrase"
          test -f .cr-release-packages/app-blueprint-*.tgz.prov

      - name: Publish signed chart release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          chart_name=$(helm show chart ./charts/app-blueprint | awk '/^name:/ { print $2 }')
          chart_version=$(helm show chart ./charts/app-blueprint | awk '/^version:/ { print $2 }')
          tag="${chart_name}-${chart_version}"
          package=".cr-release-packages/${tag}.tgz"
          provenance="${package}.prov"
          download_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${tag}"

          test -f "${package}"
          test -f "${provenance}"

          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release upload "${tag}" "${package}" "${provenance}" --clobber
          else
            gh release create "${tag}" "${package}" "${provenance}" \
              --title "${tag}" \
              --notes "Release ${tag}" \
              --target "${GITHUB_SHA}" \
              --latest
          fi

          git fetch origin gh-pages
          git worktree add .cr-index origin/gh-pages
          helm repo index .cr-release-packages \
            --url "${download_url}" \
            --merge .cr-index/index.yaml
          cp .cr-release-packages/index.yaml .cr-index/index.yaml

          if [[ -n "$(git -C .cr-index status --porcelain)" ]]; then
            git -C .cr-index add index.yaml
            git -C .cr-index commit -m "Update index.yaml"
            git -C .cr-index push origin HEAD:gh-pages
          else
            echo "Helm repository index is already up to date."
          fi

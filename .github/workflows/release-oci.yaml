name: Release chart to OCI

on:
  push:
    tags:
      - app-blueprint-*
  workflow_dispatch:
    inputs:
      version:
        description: Chart version to publish
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5
        with:
          version: v3.17.3

      - name: Verify release version
        shell: bash
        run: |
          set -euo pipefail
          chart_version=$(helm show chart ./charts/app-blueprint | awk '/^version:/ { print $2 }')
          requested_version="${{ inputs.version }}"
          if [[ -z "${requested_version}" ]]; then
            requested_version="${GITHUB_REF_NAME#app-blueprint-}"
          fi
          test "${chart_version}" = "${requested_version}"

      - name: Log in to GHCR
        shell: bash
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Package and push
        shell: bash
        run: |
          set -euo pipefail
          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          helm package ./charts/app-blueprint --destination ./dist
          helm push ./dist/app-blueprint-*.tgz "oci://ghcr.io/${owner}/charts"

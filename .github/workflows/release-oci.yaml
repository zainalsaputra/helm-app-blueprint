name: Release chart to OCI

on:
  push:
    tags:
      - app-blueprint-*
  workflow_dispatch:
    inputs:
      version:
        description: Chart version to publish
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      HELM_GPG_KEY_FINGERPRINT: 83277AE8E473B1DE0E1D099C97173EB43D39EA40
      HELM_GPG_KEY_NAME: "Helm App Blueprint Release <zainalsaputra@users.noreply.github.com>"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5
        with:
          version: v3.17.3

      - name: Verify release version
        shell: bash
        run: |
          set -euo pipefail
          chart_version=$(helm show chart ./charts/app-blueprint | awk '/^version:/ { print $2 }')
          requested_version="${{ inputs.version }}"
          if [[ -z "${requested_version}" ]]; then
            requested_version="${GITHUB_REF_NAME#app-blueprint-}"
          fi
          test "${chart_version}" = "${requested_version}"

      - name: Log in to GHCR
        shell: bash
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Import chart signing key
        shell: bash
        env:
          HELM_GPG_PRIVATE_KEY: ${{ secrets.HELM_GPG_PRIVATE_KEY }}
          HELM_GPG_PASSPHRASE: ${{ secrets.HELM_GPG_PASSPHRASE }}
        run: |
          set -euo pipefail
          test -n "${HELM_GPG_PRIVATE_KEY}"
          test -n "${HELM_GPG_PASSPHRASE}"

          export GNUPGHOME="${RUNNER_TEMP}/gnupg"
          mkdir -p "${GNUPGHOME}"
          chmod 700 "${GNUPGHOME}"

          printf '%s' "${HELM_GPG_PRIVATE_KEY}" | gpg --batch --import
          printf '%s' "${HELM_GPG_PASSPHRASE}" > "${RUNNER_TEMP}/helm-gpg-passphrase"
          chmod 600 "${RUNNER_TEMP}/helm-gpg-passphrase"

          gpg --batch --yes --pinentry-mode loopback \
            --passphrase-file "${RUNNER_TEMP}/helm-gpg-passphrase" \
            --output "${RUNNER_TEMP}/helm-secring.gpg" \
            --export-secret-keys "${HELM_GPG_KEY_FINGERPRINT}"

      - name: Package and push signed chart
        shell: bash
        run: |
          set -euo pipefail
          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          helm package ./charts/app-blueprint \
            --destination ./dist \
            --sign \
            --key "${HELM_GPG_KEY_NAME}" \
            --keyring "${RUNNER_TEMP}/helm-secring.gpg" \
            --passphrase-file "${RUNNER_TEMP}/helm-gpg-passphrase"
          test -f ./dist/app-blueprint-*.tgz.prov
          helm push ./dist/app-blueprint-*.tgz "oci://ghcr.io/${owner}/charts"

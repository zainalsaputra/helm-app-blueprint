name: Lint and test chart

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  static-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5
        with:
          version: v3.17.3

      - name: Helm lint
        run: helm lint --strict ./charts/app-blueprint

      - name: Render default and examples
        shell: bash
        run: |
          set -euo pipefail
          helm template test ./charts/app-blueprint >/dev/null
          for values in examples/*-values.yaml; do
            echo "Rendering ${values}"
            helm template test ./charts/app-blueprint -f "${values}" >/dev/null
          done

      - name: Validate Kubernetes manifests
        shell: bash
        run: |
          set -euo pipefail
          KUBECONFORM_VERSION=0.8.0
          curl --fail --show-error --silent --location \
            "https://github.com/yannh/kubeconform/releases/download/v${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" \
            --output kubeconform-linux-amd64.tar.gz
          curl --fail --show-error --silent --location \
            "https://github.com/yannh/kubeconform/releases/download/v${KUBECONFORM_VERSION}/CHECKSUMS" \
            --output CHECKSUMS
          grep 'kubeconform-linux-amd64.tar.gz$' CHECKSUMS | sha256sum --check
          tar -xzf kubeconform-linux-amd64.tar.gz kubeconform
          helm template test ./charts/app-blueprint \
            | ./kubeconform -strict -summary -ignore-missing-schemas
          for values in examples/*-values.yaml; do
            helm template test ./charts/app-blueprint -f "${values}" \
              | ./kubeconform -strict -summary -ignore-missing-schemas
          done

      - name: Run Helm unit tests
        shell: bash
        run: |
          set -euo pipefail
          UNITTEST_VERSION=1.1.1
          curl --fail --show-error --silent --location \
            "https://github.com/helm-unittest/helm-unittest/releases/download/v${UNITTEST_VERSION}/helm-unittest-linux-amd64-${UNITTEST_VERSION}.tgz" \
            --output helm-unittest.tgz
          echo "07c4fee69e9402e5f66f35b4f932b66afdf9c848637f06196fc479b501d6ad29  helm-unittest.tgz" \
            | sha256sum --check
          tar -xzf helm-unittest.tgz
          ./untt-linux-amd64 ./charts/app-blueprint

      - name: Package chart
        run: helm package ./charts/app-blueprint --destination ./dist

  install-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Set up chart-testing
        uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f # v2.8.0

      - name: Create Kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0

      - name: Install chart
        run: ct install --config ct.yaml --charts charts/app-blueprint

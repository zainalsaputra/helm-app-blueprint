name: Lint and test chart

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  static-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.3

      - name: Helm lint
        run: helm lint --strict ./charts/app-template

      - name: Render default and examples
        shell: bash
        run: |
          set -euo pipefail
          helm template test ./charts/app-template >/dev/null
          for values in examples/*-values.yaml; do
            echo "Rendering ${values}"
            helm template test ./charts/app-template -f "${values}" >/dev/null
          done

      - name: Package chart
        run: helm package ./charts/app-template --destination ./dist

  install-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.7.0

      - name: Create Kind cluster
        uses: helm/kind-action@v1.12.0

      - name: Install chart
        run: ct install --config ct.yaml --charts charts/app-template


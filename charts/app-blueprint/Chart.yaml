  - deployment
  - gitops
  - helm
  - helm-chart
  - kubernetes
  - web
  - api
home: https://github.com/zainalsaputra/helm-app-blueprint
icon: https://raw.githubusercontent.com/zainalsaputra/helm-app-blueprint/main/assets/icon.svg
sources:
  - https://github.com/zainalsaputra/helm-app-blueprint
maintainers:
  - name: Zainal Saputra
    email: zainalsaputra@users.noreply.github.com
    url: https://github.com/zainalsaputra
annotations:
  artifacthub.io/alternativeName: helm-app-blueprint
  artifacthub.io/category: integration-delivery
  artifacthub.io/license: Apache-2.0
